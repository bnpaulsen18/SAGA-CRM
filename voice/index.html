<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGA Cofounder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Figtree:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF6EF; --surface:#FFFFFF; --surface-2:#F4EEE4;
    --ink:#241726; --ink-soft:#6E6577; --ink-faint:#A39AAC;
    --line:#EAE2D6; --line-2:#DED4C6;
    --coral:#F0703F; --rose:#DD4A6E; --twilight:#5B4B8A;
    --sun:linear-gradient(135deg,#F5872F 0%,#DD4A6E 52%,#5B4B8A 100%);
    --r-sm:8px; --r-md:12px; --r-lg:16px;
    --sh-sm:0 1px 2px rgba(36,23,38,.06); --sh-md:0 8px 30px rgba(36,23,38,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Figtree',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}
  .disp{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em}

  /* header */
  header{display:flex;align-items:center;gap:12px;padding:16px 22px;border-bottom:1px solid var(--line);background:rgba(250,246,239,.85);backdrop-filter:blur(8px)}
  .mark{width:34px;height:34px;border-radius:10px;flex-shrink:0;box-shadow:var(--sh-sm);overflow:hidden}
  .wm{font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;letter-spacing:-.01em}
  .role{font-size:12px;color:var(--ink-soft);margin-top:1px}
  .hf{margin-left:auto;display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-soft);font-weight:500;user-select:none;cursor:pointer}
  .sw{width:38px;height:22px;border-radius:20px;background:var(--line-2);position:relative;transition:background .18s}
  .sw i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:var(--sh-sm);transition:left .18s}
  .hf.on .sw{background:linear-gradient(135deg,#DD4A6E,#5B4B8A)}
  .hf.on .sw i{left:18px}

  /* transcript */
  .scroll{flex:1;overflow-y:auto;padding:24px 0}
  .wrap{max-width:680px;margin:0 auto;padding:0 22px;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:11px;align-items:flex-start;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
  .av.saga{overflow:hidden}
  .av.me{background:var(--twilight)}
  .bubble{font-size:15px;line-height:1.55;padding-top:4px}
  .msg.me{flex-direction:row-reverse}
  .msg.me .bubble{background:var(--surface);border:1px solid var(--line);border-radius:14px 14px 4px 14px;padding:9px 13px;color:var(--ink)}
  .msg.saga .bubble{color:var(--ink)}
  .bubble .cursor{display:inline-block;width:7px;height:16px;background:var(--rose);border-radius:2px;margin-left:2px;vertical-align:-2px;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  .empty{max-width:680px;margin:8vh auto 0;text-align:center;padding:0 24px}
  .empty h1{font-size:26px;font-weight:700;margin-bottom:8px}
  .empty p{color:var(--ink-soft);font-size:15px;line-height:1.6;max-width:460px;margin:0 auto}
  .horizon{height:2px;width:60px;border-radius:2px;background:var(--sun);margin:16px auto 0}

  /* console */
  .console{border-top:1px solid var(--line);background:var(--surface);padding:16px 22px calc(16px + env(safe-area-inset-bottom))}
  .console-in{max-width:680px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:12px}
  .status{font-size:12.5px;color:var(--ink-faint);font-weight:500;min-height:16px;text-align:center}
  .status b{color:var(--rose);font-weight:600}
  .mic{position:relative;width:74px;height:74px;border:none;border-radius:50%;cursor:pointer;background:var(--sun);box-shadow:var(--sh-md);display:flex;align-items:center;justify-content:center;transition:transform .12s}
  .mic:hover{transform:translateY(-1px)}
  .mic:active{transform:scale(.97)}
  .mic svg{width:28px;height:28px;color:#fff}
  .mic .ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--rose);opacity:0;pointer-events:none}
  .mic.listening .ring{animation:ring 1.4s ease-out infinite}
  @keyframes ring{0%{transform:scale(.92);opacity:.55}100%{transform:scale(1.25);opacity:0}}
  .mic.speaking{background:var(--surface-2)}
  .mic.speaking svg{color:var(--twilight)}
  .mic[disabled]{opacity:.5;cursor:not-allowed}

  .row{display:flex;width:100%;gap:9px;align-items:center}
  .row input{flex:1;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:10px 13px;outline:none}
  .row input:focus{border-color:var(--twilight)}
  .row input::placeholder{color:var(--ink-faint)}
  .row button{font-family:inherit;font-size:13px;font-weight:600;border:1px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:var(--r-sm);padding:10px 14px;cursor:pointer}
  .row button:hover{background:var(--surface-2)}
  .stop{border:none!important;background:var(--surface-2)!important;color:var(--ink-soft)!important}
  .note{font-size:11.5px;color:var(--ink-faint);text-align:center;line-height:1.5}
</style>
</head>
<body>
  <header>
    <span class="mark">
      <svg width="34" height="34" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#F5872F"/><stop offset="0.52" stop-color="#DD4A6E"/><stop offset="1" stop-color="#5B4B8A"/>
          </linearGradient>
          <clipPath id="rc"><rect width="34" height="34" rx="10"/></clipPath>
        </defs>
        <g clip-path="url(#rc)">
          <rect width="34" height="34" fill="url(#sun)"/>
          <circle cx="17" cy="20.5" r="6.4" fill="#FBE6C8" opacity="0.95"/>
          <rect x="0" y="22" width="34" height="12" fill="#5B4B8A"/>
          <rect x="0" y="22" width="34" height="12" fill="url(#sun)" opacity="0.34"/>
          <path d="M0 24.5h34M0 27.5h34M0 30.5h34" stroke="#FAF6EF" stroke-opacity="0.22" stroke-width="1"/>
        </g>
      </svg>
    </span>
    <div>
      <div class="wm">SAGA</div>
      <div class="role">Cofounder · voice</div>
    </div>
    <div class="hf" id="hf" title="After each reply, start listening again">
      <span>Hands-free</span><span class="sw"><i></i></span>
    </div>
  </header>

  <div class="scroll" id="scroll">
    <div class="empty" id="empty">
      <h1 class="disp">Let's work on the raise.</h1>
      <p>Tap the mic and talk to your cofounder — pitch prep, investor questions, what to focus on this week. Try: <em>"What should I be doing this week to get us to a $5M pre-seed?"</em></p>
      <div class="horizon"></div>
    </div>
    <div class="wrap" id="messages"></div>
  </div>

  <div class="console">
    <div class="console-in">
      <div class="status" id="status">&nbsp;</div>
      <button class="mic" id="mic" title="Click to talk">
        <span class="ring"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/>
        </svg>
      </button>
      <div class="row">
        <input id="text" type="text" placeholder="…or type to your cofounder" autocomplete="off">
        <button id="send">Send</button>
        <button id="stop" class="stop" title="Stop speaking">Stop</button>
      </div>
      <div class="note" id="note">&nbsp;</div>
    </div>
  </div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const messagesEl = $('messages'), scrollEl = $('scroll'), statusEl = $('status'),
        emptyEl = $('empty'), micBtn = $('mic'), textIn = $('text'),
        sendBtn = $('send'), stopBtn = $('stop'), hfBtn = $('hf'), noteEl = $('note');

  const history = [];          // [{role, content}] sent to the server each turn
  let busy = false;            // awaiting/streaming a reply
  let handsFree = false;
  let recognizing = false;

  // ---------- speech recognition (STT) ----------
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;
  if (SR) {
    recog = new SR();
    recog.lang = 'en-US';
    recog.interimResults = true;
    recog.continuous = false;
    let finalText = '';
    recog.onstart = () => { recognizing = true; finalText = ''; micBtn.classList.add('listening'); setStatus('Listening…'); };
    recog.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += t; else interim += t;
      }
      setStatus((finalText + interim).trim() || 'Listening…');
    };
    recog.onerror = (e) => { setStatus(e.error === 'no-speech' ? 'Didn’t catch that — try again.' : 'Mic error: ' + e.error); };
    recog.onend = () => {
      recognizing = false; micBtn.classList.remove('listening');
      const said = finalText.trim();
      if (said) { send(said); } else { setStatus(' '); }
    };
  } else {
    micBtn.disabled = true;
    noteEl.textContent = 'Voice input needs Chrome — you can type below.';
  }

  // ---------- speech synthesis (TTS) ----------
  let preferredVoice = null;
  function pickVoice() {
    const vs = speechSynthesis.getVoices();
    preferredVoice = vs.find(v => /en[-_]US/i.test(v.lang) && /Google/i.test(v.name))
      || vs.find(v => /Samantha|Jenny|Aria|Natural/i.test(v.name))
      || vs.find(v => /^en/i.test(v.lang)) || null;
  }
  if ('speechSynthesis' in window) {
    pickVoice();
    speechSynthesis.onvoiceschanged = pickVoice;
  }
  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    const clean = text.replace(/[*_`#>]/g, '').replace(/\s+/g, ' ').trim();
    if (!clean) return;
    const u = new SpeechSynthesisUtterance(clean);
    if (preferredVoice) u.voice = preferredVoice;
    u.rate = 1.04; u.pitch = 1.0;
    u.onstart = () => micBtn.classList.add('speaking');
    u.onend = () => { if (!speechSynthesis.speaking && !speechSynthesis.pending) micBtn.classList.remove('speaking'); };
    speechSynthesis.speak(u);
  }
  function stopSpeaking() {
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    micBtn.classList.remove('speaking');
  }

  // chunk streaming text into sentences so speech starts before the reply ends
  let ttsBuf = '';
  function feedTTS(chunk) {
    ttsBuf += chunk;
    let idx;
    while ((idx = ttsBuf.search(/[.!?](\s|$)/)) !== -1) {
      const sentence = ttsBuf.slice(0, idx + 1).trim();
      ttsBuf = ttsBuf.slice(idx + 1);
      if (sentence) speak(sentence);
    }
  }
  function flushTTS() { const rest = ttsBuf.trim(); ttsBuf = ''; if (rest) speak(rest); }

  // ---------- UI helpers ----------
  function setStatus(s) { statusEl.innerHTML = s || '&nbsp;'; }
  function addBubble(role, text) {
    if (emptyEl) emptyEl.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg ' + (role === 'user' ? 'me' : 'saga');
    const av = document.createElement('div');
    av.className = 'av ' + (role === 'user' ? 'me' : 'saga');
    if (role === 'user') av.textContent = 'You';
    else av.innerHTML = '<svg width="30" height="30" viewBox="0 0 34 34"><defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F5872F"/><stop offset=".52" stop-color="#DD4A6E"/><stop offset="1" stop-color="#5B4B8A"/></linearGradient></defs><rect width="34" height="34" rx="9" fill="url(#g2)"/><circle cx="17" cy="20" r="6" fill="#FBE6C8"/><rect x="0" y="21" width="34" height="13" rx="0" fill="#5B4B8A" opacity=".55"/></svg>';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(av); msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollEl.scrollTop = scrollEl.scrollHeight;
    return bubble;
  }
  function scrollDown() { scrollEl.scrollTop = scrollEl.scrollHeight; }

  // ---------- send a turn ----------
  async function send(text) {
    text = (text || '').trim();
    if (!text || busy) return;
    stopSpeaking();
    busy = true; micBtn.disabled = true; sendBtn.disabled = true;
    addBubble('user', text);
    history.push({ role: 'user', content: text });

    const bubble = addBubble('assistant', '');
    bubble.innerHTML = '<span class="cursor"></span>';
    setStatus('Thinking…');
    let full = '';
    try {
      const resp = await fetch('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      ttsBuf = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = dec.decode(value, { stream: true });
        full += chunk;
        bubble.textContent = full;
        feedTTS(chunk);
        scrollDown();
      }
      flushTTS();
    } catch (e) {
      full = full || ('Connection error — is the voice server still running? (' + e.message + ')');
      bubble.textContent = full;
    }
    history.push({ role: 'assistant', content: full });
    setStatus(' ');
    busy = false; micBtn.disabled = !SR; sendBtn.disabled = false;

    // hands-free: listen again once speech winds down
    if (handsFree && SR) waitThenListen();
  }

  function waitThenListen() {
    const tick = () => {
      if (busy) return;
      if ('speechSynthesis' in window && (speechSynthesis.speaking || speechSynthesis.pending)) {
        setTimeout(tick, 400);
      } else if (handsFree && !recognizing) {
        try { recog.start(); } catch (_) {}
      }
    };
    setTimeout(tick, 350);
  }

  // ---------- controls ----------
  micBtn.addEventListener('click', () => {
    if (!recog) return;
    if (recognizing) { recog.stop(); return; }
    stopSpeaking();
    try { recog.start(); } catch (_) {}
  });
  stopBtn.addEventListener('click', () => { stopSpeaking(); if (recognizing) recog.stop(); });
  sendBtn.addEventListener('click', () => { const v = textIn.value; textIn.value = ''; send(v); });
  textIn.addEventListener('keydown', (e) => { if (e.key === 'Enter') { const v = textIn.value; textIn.value = ''; send(v); } });
  hfBtn.addEventListener('click', () => {
    handsFree = !handsFree;
    hfBtn.classList.toggle('on', handsFree);
    if (handsFree && SR && !busy && !recognizing) { stopSpeaking(); try { recog.start(); } catch (_) {} }
  });
})();
</script>
</body>
</html>
